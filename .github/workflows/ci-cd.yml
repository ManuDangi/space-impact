name: 🚀 Deploy Space Impact

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 📁 Setup Pages
        uses: actions/configure-pages@v3

      - name: 📦 Prepare Files
        run: |
          mkdir dist
          cp -r * dist

      - name: 📤 Upload
        uses: actions/upload-pages-artifact@v2
        with:
          path: dist

      - name: 🚀 Deploy
        uses: actions/deploy-pages@v2
